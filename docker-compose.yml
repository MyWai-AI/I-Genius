services:
  vilma-agent:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        DEBUG_MODE: ${DEBUG_MODE:-false}
        LOCAL_HOST_RUN_ENV: ${LOCAL_HOST_RUN_ENV:-false}
    image: igenius:latest
    container_name: igenius
    ports:
      - "9002:8504"
    environment:
      DEBUG_MODE: ${DEBUG_MODE:-false}
      LOCAL_HOST_RUN_ENV: ${LOCAL_HOST_RUN_ENV:-false}
      DATA_MAX_AGE_HOURS: ${DATA_MAX_AGE_HOURS:-168}
      DATA_CLEANUP_INTERVAL_MINUTES: ${DATA_CLEANUP_INTERVAL_MINUTES:-60}
    restart: unless-stopped
    tty: true
    stdin_open: true
