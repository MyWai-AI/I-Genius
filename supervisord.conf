[supervisord]
nodaemon=true
logfile=/dev/null
logfile_maxbytes=0

[program:streamlit]
command=uv run streamlit run src/streamlit_template/new_ui/pages/Common/landing_page.py --server.port=8504 --server.address=0.0.0.0
directory=/mywai
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:data_cleanup]
command=uv run python -m src.streamlit_template.core.Common.data_cleanup
directory=/mywai
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
