<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Sync Viewer</title>
    <!-- Vue 2 & Vuetify (Peer Dependencies) -->
    <link href="https://fonts.googleapis.com/css?family=Roboto:100,300,400,500,700,900" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/@mdi/font@6.x/css/materialdesignicons.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/vuetify@2.6.14/dist/vuetify.min.css" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/vue@2.7.14/dist/vue.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vuetify@2.6.14/dist/vuetify.js"></script>

    <!-- MYWAI Viewer Build -->
    <link href="./mywaiviewer.css" rel="stylesheet">
    <script src="./mywaiviewer.umd.js"></script>

    <!-- Plotly.js -->
    <script src="https://cdn.plot.ly/plotly-2.24.1.min.js"></script>

    <!-- Three.js + URDFLoader robot viewer (fallback when mywaiviewer bundle is absent) -->
    <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.169.0/examples/jsm/"
      }
    }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { STLLoader } from 'three/addons/loaders/STLLoader.js';
        import { ColladaLoader } from 'three/addons/loaders/ColladaLoader.js';

        // Decode a data URI to ArrayBuffer (for binary formats like STL)
        function dataUriToArrayBuffer(dataUri) {
            const b64 = dataUri.split(',')[1] || '';
            const bin = atob(b64);
            const buf = new ArrayBuffer(bin.length);
            const view = new Uint8Array(buf);
            for (let i = 0; i < bin.length; i++) view[i] = bin.charCodeAt(i);
            return buf;
        }

        // Inline minimal URDFLoader — parses URDF XML with inlined mesh data URIs
        class URDFLoader {
            parse(urdfXml) {
                const parser = new DOMParser();
                const doc = parser.parseFromString(urdfXml, 'text/xml');
                const robot = new THREE.Group();
                robot.joints = {};

                // Build global material color map from top-level <material> definitions
                const globalMaterials = {};
                doc.querySelectorAll('robot > material').forEach(m => {
                    const mname = m.getAttribute('name');
                    const colorEl = m.querySelector('color');
                    if (mname && colorEl) {
                        const rgba = (colorEl.getAttribute('rgba') || '0.5 0.5 0.5 1').split(' ').map(Number);
                        globalMaterials[mname] = new THREE.Color(rgba[0], rgba[1], rgba[2]);
                    }
                });

                const linkMeshes = {};
                const stlLoader = new STLLoader();
                const daeLoader = new ColladaLoader();

                // Load all links
                doc.querySelectorAll('link').forEach(linkEl => {
                    const name = linkEl.getAttribute('name');
                    const group = new THREE.Group();
                    group.name = name;
                    linkMeshes[name] = group;

                    linkEl.querySelectorAll('visual').forEach(visual => {
                        const meshEl = visual.querySelector('geometry mesh');
                        if (!meshEl) return;
                        const filename = meshEl.getAttribute('filename') || '';
                        if (!filename) return;

                        // Origin
                        const originEl = visual.querySelector('origin');
                        const xyz = originEl ? (originEl.getAttribute('xyz') || '0 0 0').split(' ').map(Number) : [0,0,0];
                        const rpy = originEl ? (originEl.getAttribute('rpy') || '0 0 0').split(' ').map(Number) : [0,0,0];
                        const scaleAttr = (meshEl.getAttribute('scale') || '1 1 1').split(' ').map(Number);

                        // Resolve color: inline > named reference > global material > default grey
                        let color = new THREE.Color(0x999999);
                        const matEl = visual.querySelector('material');
                        if (matEl) {
                            const inlineColor = matEl.querySelector('color');
                            if (inlineColor) {
                                const rgba = (inlineColor.getAttribute('rgba') || '0.5 0.5 0.5 1').split(' ').map(Number);
                                color = new THREE.Color(rgba[0], rgba[1], rgba[2]);
                            } else {
                                const matName = matEl.getAttribute('name');
                                if (matName && globalMaterials[matName]) color = globalMaterials[matName];
                            }
                        }

                        const onMeshLoaded = (geom) => {
                            const mat = new THREE.MeshPhongMaterial({ color, side: THREE.DoubleSide });
                            const mesh = new THREE.Mesh(geom, mat);
                            mesh.position.set(xyz[0], xyz[1], xyz[2]);
                            mesh.rotation.set(rpy[0], rpy[1], rpy[2]);
                            mesh.scale.set(scaleAttr[0], scaleAttr[1], scaleAttr[2]);
                            group.add(mesh);
                        };

                        const isDataUri = filename.startsWith('data:');
                        const isStl = filename.includes('.stl') || filename.includes('.STL') || filename.startsWith('data:model/stl');
                        const isDae = filename.includes('.dae') || filename.includes('.DAE') || filename.startsWith('data:model/vnd.collada');

                        if (isStl) {
                            if (isDataUri) {
                                // Parse directly from ArrayBuffer — no fetch needed
                                try { onMeshLoaded(stlLoader.parse(dataUriToArrayBuffer(filename))); }
                                catch(e) { console.warn('STL parse error', e); }
                            } else {
                                stlLoader.load(filename, onMeshLoaded);
                            }
                        } else if (isDae) {
                            if (isDataUri) {
                                const xml = atob(filename.split(',')[1] || '');
                                try {
                                    const result = daeLoader.parse(xml, '');
                                    result.scene.traverse(c => { if (c.isMesh) onMeshLoaded(c.geometry.clone()); });
                                } catch(e) { console.warn('DAE parse error', e); }
                            } else {
                                daeLoader.load(filename, result => {
                                    result.scene.traverse(c => { if (c.isMesh) onMeshLoaded(c.geometry.clone()); });
                                });
                            }
                        }
                    });
                    robot.add(group);
                });

                // Build joint tree
                doc.querySelectorAll('joint').forEach(jointEl => {
                    const jname = jointEl.getAttribute('name');
                    const jtype = jointEl.getAttribute('type');
                    const parentName = jointEl.querySelector('parent')?.getAttribute('link');
                    const childName = jointEl.querySelector('child')?.getAttribute('link');

                    const originEl = jointEl.querySelector('origin');
                    const xyz = originEl ? (originEl.getAttribute('xyz') || '0 0 0').split(' ').map(Number) : [0,0,0];
                    const rpy = originEl ? (originEl.getAttribute('rpy') || '0 0 0').split(' ').map(Number) : [0,0,0];

                    const axisEl = jointEl.querySelector('axis');
                    const axisXYZ = axisEl ? (axisEl.getAttribute('xyz') || '0 0 1').split(' ').map(Number) : [0,0,1];
                    const axis = new THREE.Vector3(...axisXYZ).normalize();

                    const childGroup = linkMeshes[childName];
                    if (!childGroup) return;

                    // Re-parent child under parent
                    const parentGroup = linkMeshes[parentName] || robot;
                    childGroup.position.set(xyz[0], xyz[1], xyz[2]);
                    childGroup.rotation.set(rpy[0], rpy[1], rpy[2]);
                    parentGroup.add(childGroup);

                    if (jtype === 'fixed') return;

                    // Snapshot rest pose so setJointValue applies on top of it
                    const restQuat = childGroup.quaternion.clone();
                    const restPos = childGroup.position.clone();

                    robot.joints[jname] = {
                        _group: childGroup,
                        _axis: axis,
                        _type: jtype,
                        _restQuat: restQuat,
                        _restPos: restPos,
                        setJointValue(val) {
                            if (this._type === 'revolute' || this._type === 'continuous') {
                                const delta = new THREE.Quaternion().setFromAxisAngle(this._axis, val);
                                this._group.quaternion.multiplyQuaternions(this._restQuat, delta);
                            } else if (this._type === 'prismatic') {
                                this._group.position.copy(this._restPos).addScaledVector(this._axis, val);
                            }
                        }
                    };
                });

                return robot;
            }
        }

        // Expose a global controller so the classic Vue script can call in
        window.RobotViewer = {
            _renderer: null,
            _animRunning: false,
            _robot: null,
            _traj: [],

            init(containerId, urdfDataUri, trajectory, rotationDeg, positionM) {
                const el = document.getElementById(containerId);
                if (!el) return;

                // Tear down previous instance
                this.destroy();
                el.innerHTML = '';

                const w = el.clientWidth || 600;
                const h = el.clientHeight || 500;

                const scene = new THREE.Scene();
                scene.background = new THREE.Color(0x222222);

                const camera = new THREE.PerspectiveCamera(45, w / h, 0.01, 100);
                camera.position.set(1.5, 1.5, 1.5);

                const renderer = new THREE.WebGLRenderer({ antialias: true });
                renderer.setSize(w, h);
                renderer.setPixelRatio(window.devicePixelRatio);
                el.appendChild(renderer.domElement);
                this._renderer = renderer;

                const controls = new OrbitControls(camera, renderer.domElement);
                controls.target.set(0, 0.4, 0);
                controls.update();

                scene.add(new THREE.AmbientLight(0xffffff, 0.7));
                const dir = new THREE.DirectionalLight(0xffffff, 0.8);
                dir.position.set(2, 4, 2);
                scene.add(dir);
                scene.add(new THREE.GridHelper(2, 20, 0x444444, 0x333333));

                // Decode base64 URDF data URI → raw XML
                const b64 = urdfDataUri.split(',')[1] || '';
                const urdfXml = atob(b64);

                const loader = new URDFLoader();
                // Meshes are already inlined as data URIs inside the XML — no custom load needed
                const robot = loader.parse(urdfXml);
                robot.rotation.set(
                    THREE.MathUtils.degToRad(rotationDeg[0]),
                    THREE.MathUtils.degToRad(rotationDeg[1]),
                    THREE.MathUtils.degToRad(rotationDeg[2])
                );
                robot.position.set(positionM[0], positionM[1], positionM[2]);
                scene.add(robot);
                this._robot = robot;
                this._traj = trajectory || [];

                // Apply first frame immediately
                if (this._traj.length > 0) this.seekToFrame(0);

                this._animRunning = true;
                const animate = () => {
                    if (!this._animRunning) return;
                    requestAnimationFrame(animate);
                    controls.update();
                    renderer.render(scene, camera);
                };
                animate();

                if (window.ResizeObserver) {
                    this._ro = new ResizeObserver(() => {
                        const nw = el.clientWidth, nh = el.clientHeight;
                        if (nw > 0 && nh > 0) {
                            camera.aspect = nw / nh;
                            camera.updateProjectionMatrix();
                            renderer.setSize(nw, nh);
                        }
                    });
                    this._ro.observe(el);
                }
            },

            seekToTime(time) {
                if (!this._robot || this._traj.length === 0) return;
                let idx = 0, minDiff = Infinity;
                for (let i = 0; i < this._traj.length; i++) {
                    const d = Math.abs(this._traj[i].time - time);
                    if (d < minDiff) { minDiff = d; idx = i; }
                }
                this.seekToFrame(idx);
            },

            seekToFrame(idx) {
                const frame = this._traj[idx];
                if (!frame || !frame.q) return;
                Object.entries(frame.q).forEach(([name, val]) => {
                    if (this._robot.joints[name]) this._robot.joints[name].setJointValue(val);
                });
            },

            destroy() {
                this._animRunning = false;
                if (this._ro) { this._ro.disconnect(); this._ro = null; }
                if (this._renderer) { this._renderer.dispose(); this._renderer = null; }
                this._robot = null;
                this._traj = [];
            }
        };
    </script>

    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100vh;
            background: #0e1117;
            color: white;
        }

        #app {
            width: 100vw;
            height: 100vh;
        }

        /* Use CSS Grid for strict separation */
        #main-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            /* Equal split */
            grid-template-rows: 1fr;
            width: 100%;
            height: 100%;
            gap: 10px;
            padding: 10px;
            box-sizing: border-box;
        }

        .col-video {
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .col-viewer {
            background: #222;
            /* Darker bg for 3D */
            border-radius: 8px;
            overflow: hidden;
            position: relative;
            border: 1px solid #444;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            /* Ensure video fits */
        }

        /* Vuetify overrides */
        .v-application {
            background: transparent !important;
            width: 100%;
            height: 100%;
        }

        /* Ensure component takes full height */
        .v-application--wrap {
            min-height: 100% !important;
        }
    </style>
</head>

<body>
    <div id="app">
        <v-app>
            <div id="main-layout" :style="layoutStyle">
                <div class="col-video" v-if="videoSrc">
                    <video ref="videoPlayer" controls :src="videoSrc" @timeupdate="onTimeUpdate"
                        @loadedmetadata="onVideoLoaded"></video>
                </div>
                <div class="col-viewer">

                    <!-- MODE: ROBOT with bundle -->
                    <component v-if="isRobotBundleAvailable && !isDmpMode && viewerData" is="mywaiviewer"
                        :viewer-data="viewerData" :enable-algo="false" :backend-end-point="null" ref="viewer"
                        style="width:100%; height:100%; display:block;">
                    </component>

                    <!-- Always in DOM so Plotly can target them; shown/hidden via display -->
                    <!-- MODE: ROBOT fallback (bundle unavailable) -->
                    <div id="robot-fallback-chart"
                        :style="{ display: (!isRobotBundleAvailable && !isDmpMode && viewerData) ? 'block' : 'none', width: '100%', height: '100%' }">
                    </div>

                    <!-- MODE: DMP (Plotly) -->
                    <div id="dmp-chart"
                        :style="{ display: (isDmpMode && viewerData) ? 'block' : 'none', width: '100%', height: '100%' }">
                    </div>

                    <div v-if="!viewerData"
                        style="display:flex; justify-content:center; align-items:center; height:100%; color:#aaa;">
                        Waiting for Data...
                    </div>
                </div>
            </div>
        </v-app>
    </div>

    <!-- Minimal Streamlit Client -->
    <script>
        const Streamlit = {
            setComponentReady: function () {
                window.parent.postMessage({ isStreamlitMessage: true, type: "streamlit:componentReady", apiVersion: 1 }, "*");
            },
            setFrameHeight: function (height) {
                window.parent.postMessage({ isStreamlitMessage: true, type: "streamlit:setFrameHeight", height: height }, "*");
            },
            events: {
                addEventListener: function (type, callback) {
                    window.addEventListener("message", function (event) {
                        if (event.data.type === type) {
                            callback(event.data);
                        }
                    });
                }
            }
        };

        // Initialize Vue
        // DEBUG: Check if window.mywaiviewer exists
        console.log("MyWAIViewer Global:", window.mywaiviewer);

        // Manual Registration if UMD library exposes the component directly or as a plugin
        if (window.mywaiviewer && window.mywaiviewer.DynamicViewer) {
            // It's a library exporting multiple components
            Vue.component('mywaiviewer', window.mywaiviewer.DynamicViewer);
        } else if (window.mywaiviewer) {
            // Fallback if it was default exported
            Vue.component('mywaiviewer', window.mywaiviewer);
        }

        var app = new Vue({
            el: '#app',
            vuetify: new Vuetify({ theme: { dark: true } }),
            data: {
                videoSrc: null,
                viewerData: null,
                ready: false,
                lastSeekTime: 0,
                videoDuration: 0,
                isRobotBundleAvailable: !!(window.mywaiviewer),
            },
            computed: {
                layoutStyle() {
                    return {
                        'grid-template-columns': this.videoSrc ? '1fr 1fr' : '1fr'
                    };
                },
                isDmpMode() {
                    return this.viewerData && this.viewerData.mode === 'dmp';
                }
            },
            watch: {
                viewerData: {
                    handler(val) {
                        if (val && val.mode === 'dmp') {
                            this.$nextTick(() => {
                                this.initPlotly();
                            });
                        } else if (val && !this.isRobotBundleAvailable) {
                            this.$nextTick(() => {
                                this.initRobotFallback();
                            });
                        }
                    },
                    deep: true
                }
            },
            methods: {
                onVideoLoaded(e) {
                    this.videoDuration = e.target.duration;
                },
                onTimeUpdate(e) {
                    const t = e.target.currentTime;

                    // ROBOT SYNC
                    if (!this.isDmpMode) {
                        if (this.isRobotBundleAvailable) {
                            if (window.mywaiViewer && window.mywaiViewer.seek) {
                                window.mywaiViewer.seek(t);
                            }
                        } else {
                            this.updateRobotFallbackMarker(t);
                        }
                    }
                    // DMP SYNC
                    else {
                        this.updatePlotlyMarker(t);
                    }
                },

                initRobotFallback() {
                    if (!this.viewerData || this.isRobotBundleAvailable || this.isDmpMode) return;
                    if (!window.RobotViewer) {
                        // Module script is deferred — retry once it's ready
                        setTimeout(() => this.initRobotFallback(), 100);
                        return;
                    }
                    const model = (this.viewerData.models || [])[0] || {};
                    if (!model.path) return;
                    window.RobotViewer.init(
                        'robot-fallback-chart',
                        model.path,
                        model.trajectory || [],
                        model.rotation || [-90, 0, 0],
                        model.position || [0, 0, 0]
                    );
                },

                updateRobotFallbackMarker(time) {
                    if (window.RobotViewer) window.RobotViewer.seekToTime(time);
                },

                initPlotly() {
                    if (!this.viewerData || !this.viewerData.dmpTrajectory) return;

                    const traj = this.viewerData.dmpTrajectory;
                    // traj: { x: [], y: [], z: [], t: [], markers?: [...], segments?: [...] }

                    const traces = [];

                    // --- SEGMENTS: phase-colored trajectory lines ---
                    if (traj.segments && traj.segments.length > 0) {
                        // Render each segment as a separate colored line
                        traj.segments.forEach(seg => {
                            const sx = traj.x.slice(seg.startIdx, seg.endIdx + 1);
                            const sy = traj.y.slice(seg.startIdx, seg.endIdx + 1);
                            const sz = traj.z.slice(seg.startIdx, seg.endIdx + 1);
                            traces.push({
                                type: 'scatter3d', mode: 'lines',
                                x: sx, y: sy, z: sz,
                                line: { width: 5, color: seg.color || '#1f77b4' },
                                name: seg.label || 'Segment',
                                hoverinfo: 'none'
                            });
                        });
                    } else {
                        // Fallback: single-color trajectory line
                        traces.push({
                            type: 'scatter3d', mode: 'lines',
                            x: traj.x, y: traj.y, z: traj.z,
                            line: { width: 5, color: '#1f77b4' },
                            name: 'Trajectory',
                            hoverinfo: 'none'
                        });
                    }

                    // Clickable invisible points for seeking
                    traces.push({
                        type: 'scatter3d', mode: 'markers',
                        x: traj.x, y: traj.y, z: traj.z,
                        marker: { size: 4, opacity: 0 },
                        name: 'Seek', customdata: traj.t,
                        hovertemplate: 'Time: %{customdata:.2f}s<extra></extra>'
                    });

                    // Current time marker (dynamic, updated via updatePlotlyMarker)
                    traces.push({
                        type: 'scatter3d', mode: 'markers',
                        x: [traj.x[0]], y: [traj.y[0]], z: [traj.z[0]],
                        marker: { size: 10, color: 'yellow', symbol: 'diamond' },
                        name: 'Current Time'
                    });

                    // --- MARKERS: customizable labeled points ---
                    if (traj.markers && traj.markers.length > 0) {
                        // Each marker: { label: str, index: int, color: str }
                        const mx = [], my = [], mz = [], mtext = [], mcolors = [];
                        traj.markers.forEach(m => {
                            const i = Math.min(m.index, traj.x.length - 1);
                            mx.push(traj.x[i]);
                            my.push(traj.y[i]);
                            mz.push(traj.z[i]);
                            mtext.push(m.label);
                            mcolors.push(m.color || '#ffffff');
                        });
                        traces.push({
                            type: 'scatter3d', mode: 'markers+text',
                            x: mx, y: my, z: mz,
                            marker: { size: 8, color: mcolors },
                            text: mtext, textposition: 'top center',
                            name: 'Phases'
                        });
                    } else {
                        // Fallback: hardcoded Pick/Place at first/last
                        traces.push({
                            type: 'scatter3d', mode: 'markers+text',
                            x: [traj.x[0]], y: [traj.y[0]], z: [traj.z[0]],
                            marker: { size: 8, color: '#00cc96' },
                            text: ['Pick'], textposition: 'top center', name: 'Pick'
                        });
                        traces.push({
                            type: 'scatter3d', mode: 'markers+text',
                            x: [traj.x[traj.x.length - 1]], y: [traj.y[traj.y.length - 1]], z: [traj.z[traj.z.length - 1]],
                            marker: { size: 8, color: '#ef553b' },
                            text: ['Place'], textposition: 'top center', name: 'Place'
                        });
                    }

                    const layout = {
                        scene: {
                            xaxis: { title: 'X', showgrid: true, zeroline: false, showline: false, color: '#aaa' },
                            yaxis: { title: 'Y', showgrid: true, zeroline: false, showline: false, color: '#aaa' },
                            zaxis: { title: 'Z', showgrid: true, zeroline: false, showline: false, color: '#aaa' },
                            aspectmode: 'data',
                            bgcolor: '#222'
                        },
                        paper_bgcolor: '#222',
                        font: { color: '#eee' },
                        margin: { l: 0, r: 0, b: 0, t: 30 },
                        showlegend: true,
                        legend: { x: 0, y: 1 },
                        title: { text: 'DMP Trajectory (Click to Seek)', font: { size: 14 } }
                    };

                    Plotly.newPlot('dmp-chart', traces, layout, { responsive: true });

                    // --- UPDATE: find the "Current Time" marker index for updatePlotlyMarker ---
                    // It's always at trace index = (segments or 1 line) + 1 (seek) + 0-based = segments.length ? segments.length+1 : 2
                    const numSegments = (traj.segments && traj.segments.length > 0) ? traj.segments.length : 1;
                    this._dmpCurrentTimeTraceIdx = numSegments + 1; // after segment traces + seek trace

                    // Click listener
                    const gd = document.getElementById('dmp-chart');
                    gd.on('plotly_click', (data) => {
                        if (data.points && data.points.length > 0) {
                            const pt = data.points[0];
                            if (pt.customdata !== undefined) {
                                const t = pt.customdata;
                                const vid = this.$refs.videoPlayer;
                                if (vid) {
                                    vid.currentTime = t;
                                }
                            }
                        }
                    });
                },

                updatePlotlyMarker(time) {
                    if (!this.viewerData || !this.viewerData.dmpTrajectory) return;
                    const traj = this.viewerData.dmpTrajectory;

                    // Find index closest to time
                    let idx = 0;
                    let minDiff = Infinity;
                    for (let i = 0; i < traj.t.length; i++) {
                        const diff = Math.abs(traj.t[i] - time);
                        if (diff < minDiff) { minDiff = diff; idx = i; }
                    }

                    // Update "Current Time" marker trace using dynamic index
                    const traceIdx = this._dmpCurrentTimeTraceIdx || 2;
                    Plotly.restyle('dmp-chart', {
                        x: [[traj.x[idx]]],
                        y: [[traj.y[idx]]],
                        z: [[traj.z[idx]]]
                    }, [traceIdx]);
                }
            },
            mounted() {
                Streamlit.setComponentReady();
                Streamlit.setFrameHeight(800);

                this.$nextTick(() => {
                    // Re-init charts if viewerData arrived before mount
                    if (this.viewerData) {
                        if (this.isDmpMode) {
                            this.initPlotly();
                        } else if (!this.isRobotBundleAvailable) {
                            this.initRobotFallback();
                        }
                    }

                    const appEl = document.getElementById('app');
                    if (appEl && window.ResizeObserver) {
                        const ro = new ResizeObserver((entries) => {
                            for (let entry of entries) {
                                if (entry.contentRect.width > 0 && entry.contentRect.height > 0) {
                                    window.dispatchEvent(new Event('resize'));
                                }
                            }
                        });
                        ro.observe(appEl);
                    }
                });
            }
        });

        // Listen for Streamlit render events
        Streamlit.events.addEventListener("streamlit:render", function (event) {
            const args = event.args; // { video_path: ..., viewer_data: ... }

            // Handle Video Source
            if (args.video_path !== app.videoSrc) {
                app.videoSrc = args.video_path;
            }

            // Handle Viewer Data
            if (args.viewer_data) {
                // Check if data actually changed to avoid re-parsing/re-init
                // Simple check on string length or deeper if needed
                const newData = JSON.parse(args.viewer_data);

                // If switching modes or first load
                if (!app.viewerData || app.viewerData.mode !== newData.mode) {
                    app.viewerData = newData;
                } else {
                    // Same mode, maybe just data update?
                    app.viewerData = newData;
                }
            }
        });
    </script>
</body>

</html>
